<!DOCTYPE html>
<html lang="ko" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GitHub 사용자 검색</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="app-header">
    <div class="app-header-inner">
      <div class="brand">
        <h1>GitHub 사용자 검색</h1>
        <p>사용자명을 입력하면 프로필과 저장소 정보를 불러옵니다.</p>
      </div>
      <button type="button" class="theme-toggle" id="themeToggle" aria-label="Switch to dark mode">
        다크 모드
      </button>
    </div>
  </header>

  <div class="wrap">
    <form class="search-row" id="searchForm" autocomplete="off">
      <input
        type="text"
        id="usernameInput"
        placeholder="사용자명 (예: octocat)"
        aria-label="GitHub username"
      />
      <button type="submit" id="searchBtn">검색</button>
    </form>

    <div class="message warn" id="msgEmpty" role="status"></div>
    <div
      class="message warn"
      id="msgError"
      role="alert"
      aria-live="assertive"
      aria-atomic="true"
    ></div>
    <div class="message info" id="msgInfo" role="status"></div>
    <div
      id="srSearchAnnounce"
      class="sr-only"
      aria-live="assertive"
      aria-atomic="true"
    ></div>

    <div class="loading" id="loading" aria-busy="true" aria-label="Loading">
      <div class="spinner" role="presentation"></div>
    </div>

    <section class="card" id="profileCard" aria-live="polite">
      <div class="profile">
        <img class="avatar" id="avatar" src="" alt="" width="120" height="120" />
        <div class="profile-main">
          <div class="profile-head">
            <div class="titles">
              <h2 id="displayName"></h2>
              <div class="login" id="loginName"></div>
            </div>
            <div class="stat-badges" aria-label="User statistics">
              <div class="badge">
                <span class="badge-label">공개 저장소</span>
                <strong id="publicRepos">0</strong>
              </div>
              <div class="badge">
                <span class="badge-label">공개 Gist</span>
                <strong id="publicGists">0</strong>
              </div>
              <div class="badge">
                <span class="badge-label">팔로워</span>
                <strong id="followers">0</strong>
              </div>
              <div class="badge">
                <span class="badge-label">팔로잉</span>
                <strong id="following">0</strong>
              </div>
            </div>
          </div>

          <div class="profile-table-wrap is-empty" id="profileTableWrap">
            <table class="profile-table" id="profileTable">
              <tbody id="profileTableBody"></tbody>
            </table>
          </div>

          <a class="btn-profile" id="viewProfileBtn" href="#" target="_blank" rel="noopener noreferrer">프로필 보기</a>
        </div>
      </div>
      <div class="contrib-wrap" id="contribWrap">
        <h3>기여 활동</h3>
        <img
          id="contribChart"
          alt="기여 활동 그래프"
          width="721"
          height="112"
          decoding="async"
          referrerpolicy="no-referrer"
        />
      </div>
    </section>

    <section class="card repos" id="reposCard">
      <h3>최근 저장소</h3>
      <ul class="repo-list" id="repoList"></ul>
      <div class="repos-load-more" id="reposLoadMoreWrap" hidden>
        <button type="button" class="repos-load-more-btn" id="reposLoadMoreBtn">더 보기</button>
      </div>
    </section>
  </div>

  <footer class="app-footer">Made by JJorifong</footer>

  <script src="app.js" defer></script>
</body>
</html>
